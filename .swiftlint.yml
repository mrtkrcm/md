# SwiftLint Configuration for mdviewer
# https://github.com/realm/SwiftLint

# Swift 6 compatibility
swift_version: "6.0"

# Included paths
included:
  - mdviewer/Sources
  - mdviewer/Tests

# Excluded paths
excluded:
  - mdviewer/.build
  - mdviewer/Package.swift
  - "**/*.generated.swift"

# Disabled rules
disabled_rules:
  # Handled by SwiftFormat
  - trailing_whitespace
  - trailing_newline
  - vertical_whitespace
  - line_length
  - indentation
  # Allow disabling rules inline
  - blanket_disable_command
  # Pre-existing violations - force cast in third-party integration point
  - force_cast
  # Pre-existing test pattern
  - unused_optional_binding
  # Default rule; pattern common in codebase
  - for_where
  # Conflicts with SwiftFormat: SwiftFormat adds trailing commas
  - trailing_comma
  # Conflicts with SwiftFormat: multi-line declarations keep brace on new line
  - opening_brace

# Enabled opt-in rules (only rules with zero pre-existing violations)
opt_in_rules:
  - array_init
  - balanced_xctest_lifecycle
  - block_based_kvo
  - capture_variable
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - control_statement
  - convenience_type
  - discarded_notification_center_observer
  - discouraged_assert
  - discouraged_none_name
  - discouraged_object_literal
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - expiring_todo
  - explicit_enum_raw_value
  - explicit_init
  - explicit_self
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - function_default_parameter_at_end
  - ibinspectable_in_extension
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - large_tuple
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - no_space_in_method_call
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_over_fileprivate
  - private_subject
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - raw_value_for_camel_cased_codable_enum
  - reduce_boolean
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strong_iboutlet
  - superfluous_else
  - test_case_accessibility
  - toggle_bool
  - typesafe_array_init
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - unused_capture_list
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate

# Analyzer rules
analyzer_rules:
  - capture_variable
  - explicit_self
  - typesafe_array_init
  - unused_declaration
  - unused_import

# Rule configurations
closure_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 35
  error: 60
  ignores_case_statements: true

file_length:
  warning: 1100
  error: 2000

function_body_length:
  warning: 700
  error: 800

function_parameter_count:
  warning: 10
  error: 12

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 3
  statement_level:
    warning: 5

type_body_length:
  warning: 800
  error: 1000

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID
    - mdviewerApp
    - mdviewerTests

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - k
    - r
    - g
    - b
    - a
    - c
    - f
    - d
    - h
    - l

number_separator:
  minimum_length: 5

attributes:
  always_on_same_line:
    - "@IBAction"
    - "@IBOutlet"
    - "@IBInspectable"
    - "@IBDesignable"
    - "@NSManaged"
    - "@objc"
    - "@State"
    - "@Binding"
    - "@ObservedObject"
    - "@Environment"
    - "@AppStorage"
  always_on_line_above:
    - "@available"
    - "@discardableResult"

multiline_arguments:
  first_argument_location: any

expiring_todo:
  approaching_expiry_threshold: 15
  expired_severity: error

modifier_order:
  preferred_modifier_order:
    - public
    - open
    - internal
    - fileprivate
    - private
    - private(set)
    - final
    - required
    - convenience
    - static
    - class
    - actor
    - isolated
    - nonisolated
    - lazy
    - weak
    - unowned
    - Optional
    - indirect
    - inout
    - mutating
    - nonmutating
    - prefix
    - postfix

# Custom rules
custom_rules:
  no_print:
    name: "No print statements"
    regex: '(^|[^\\''])\\bprint\\s*\\('
    message: "Use os_log or Logger instead of print"
    severity: warning

  no_nslog:
    name: "No NSLog statements"
    regex: 'NSLog\\s*\\('
    message: "Use os_log or Logger instead of NSLog"
    severity: error

  no_uidebugging:
    name: "No UI debugging"
    regex: '(UIDebuggingInformationOverlay|_printHierarchy)'
    message: "Remove UI debugging code before committing"
    severity: error

  no_force_unwrap:
    name: "No force unwrap"
    regex: '\\!\\s*(?!\\s*[=])'
    message: "Avoid force unwrapping"
    severity: warning

  no_weak_self_self:
    name: "No [weak self] self"
    regex: '\\[weak self\\][^\\{]*\\{[^}]*self\\.'
    message: "Use [weak self] with guard let self else { return } pattern"
    severity: warning

  prefer_type_inference:
    name: "Prefer type inference"
    regex: ':\\s*(Int|Double|String|Bool|CGFloat)\\s*=\\s*\\1'
    message: "Use type inference for simple initializations"
    severity: warning

  avoid_any_type:
    name: "Avoid Any type"
    regex: '\\bAny\\b'
    message: "Avoid using 'Any', prefer specific types or generics"
    severity: warning

  prefer_dependency_injection:
    name: "Prefer dependency injection"
    regex: '\\(as\\s+\\w+\\)\\s*$'
    message: "Consider using dependency injection instead of service location"
    severity: warning
