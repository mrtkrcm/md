# SwiftLint Configuration for mdviewer
# https://github.com/realm/SwiftLint

# Swift 6 compatibility
swift_version: "6.0"

# Included paths
included:
  - mdviewer/Sources
  - mdviewer/Tests

# Excluded paths
excluded:
  - mdviewer/.build
  - mdviewer/Package.swift
  - "**/*.generated.swift"

# Disabled rules (conflict with SwiftFormat or personal preference)
disabled_rules:
  - trailing_whitespace      # Handled by SwiftFormat
  - trailing_newline         # Handled by SwiftFormat
  - vertical_whitespace      # Handled by SwiftFormat
  - line_length              # Handled by SwiftFormat
  - indentation              # Handled by SwiftFormat
  - blanket_disable_command  # Allow disabling rules inline

# Enabled opt-in rules
opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - anonymous_argument_in_multiline_closure
  - array_init
  - attributes
  - balanced_xctest_lifecycle
  - block_based_kvo
  - capture_variable
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - control_statement
  - convenience_type
  - discarded_notification_center_observer
  - discouraged_assert
  - discouraged_none_name
  - discouraged_object_literal
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - expiring_todo
  - explicit_acl
  - explicit_enum_raw_value
  - explicit_init
  - explicit_self
  - explicit_top_level_acl
  - explicit_type_interface
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - file_name
  - file_name_no_space
  - file_types_order
  - first_where
  - flatmap_over_map_reduce
  - function_default_parameter_at_end
  - ibinspectable_in_extension
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - large_tuple
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - missing_docs
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - no_empty_block
  - no_extension_access_modifier
  - no_grouping_extension
  - no_magic_numbers
  - no_space_in_method_call
  - nslocalizedstring_key
  - nslocalizedstring_require_bundle
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_nimble
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prefixed_toplevel_constant
  - private_action
  - private_outlet
  - private_over_fileprivate
  - private_subject
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - raw_value_for_camel_cased_codable_enum
  - reduce_boolean
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - required_deinit
  - required_enum_case
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - single_test_class
  - sorted_enum_cases
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - strong_iboutlet
  - superfluous_else
  - switch_case_on_newline
  - test_case_accessibility
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - typesafe_array_init
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - unused_capture_list
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# Rule configurations
analyzer_rules:
  - capture_variable
  - explicit_self
  - typesafe_array_init
  - unused_declaration
  - unused_import

closure_body_length:
  warning: 30
  error: 50

cyclomatic_complexity:
  warning: 10
  error: 20
  ignores_case_statements: true

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 5
  error: 8

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 3
  statement_level:
    warning: 5

type_body_length:
  warning: 400
  error: 600

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - k

number_separator:
  minimum_length: 5

file_types_order:
  order:
    - supporting_type
    - main_type

type_contents_order:
  order:
    - case
    - associated_type
    - type_alias
    - subtype
    - type_property
    - instance_property
    - initializer
    - deinitializer
    - type_method
    - view_life_cycle_method
    - other_method
    - subscript

attributes:
  always_on_same_line:
    - "@IBAction"
    - "@IBOutlet"
    - "@IBInspectable"
    - "@IBDesignable"
    - "@NSManaged"
    - "@objc"
    - "@State"
    - "@Binding"
    - "@ObservedObject"
    - "@Environment"
    - "@AppStorage"
  always_on_line_above:
    - "@available"
    - "@discardableResult"

multiline_arguments:
  first_argument_location: any

expiring_todo:
  approaching_expiry_threshold: 15
  expired_severity: error

modifier_order:
  preferred_modifier_order:
    - public
    - open
    - internal
    - fileprivate
    - private
    - private(set)
    - final
    - required
    - convenience
    - static
    - class
    - actor
    - isolated
    - nonisolated
    - lazy
    - weak
    - unowned
    - Optional
    - indirect
    - inout
    - mutating
    - nonmutating
    - prefix
    - postfix

file_header:
  required_pattern: |
                    \/\/
                    \/\/  .*?\.swift
                    \/\/  mdviewer
                    \/\/

missing_docs:
  error:
    - public
  warning:
    - internal

# Custom rules
custom_rules:
  no_print:
    name: "No print statements"
    regex: '(^|[^\'])\bprint\s*\('
    message: "Use os_log or Logger instead of print"
    severity: warning

  no_nslog:
    name: "No NSLog statements"
    regex: 'NSLog\s*\('
    message: "Use os_log or Logger instead of NSLog"
    severity: error

  no_uidebugging:
    name: "No UI debugging"
    regex: '(UIDebuggingInformationOverlay|_printHierarchy)'
    message: "Remove UI debugging code before committing"
    severity: error

  no_force_unwrap:
    name: "No force unwrap"
    regex: '\!\s*(?!\s*[=])'
    message: "Avoid force unwrapping"
    severity: warning

  no_weak_self_self:
    name: "No [weak self] self"
    regex: '\[weak self\][^\{]*\{[^}]*self\.'
    message: "Use [weak self] with guard let self else { return } pattern"
    severity: warning

  prefer_type_inference:
    name: "Prefer type inference"
    regex: ':\s*(Int|Double|String|Bool|CGFloat)\s*=\s*\1'
    message: "Use type inference for simple initializations"
    severity: warning
