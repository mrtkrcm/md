# Lefthook configuration for mdviewer
# https://github.com/evilmartians/lefthook

# Pre-commit hooks
pre-commit:
  parallel: false
  commands:
    quality-staged:
      run: bash scripts/precommit-quality.sh {staged_files}

# Pre-push hooks
pre-push:
  parallel: false
  commands:
    quality:
      run: bash scripts/prepush-quality.sh

# Commit message validation
commit-msg:
  commands:
    conventional:
      run: scripts/validate-commit-msg.sh {1}

# Local commands (manual execution)
lint-fix:
  commands:
    swiftformat:
      run: scripts/format.sh --fix
    swiftlint:
      run: swiftlint --fix
