name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Swift version
        id: swift-version
        run: echo "version=$(swift --version | head -n 1 | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: mdviewer/.build
          key: ${{ runner.os }}-swift-${{ steps.swift-version.outputs.version }}-${{ hashFiles('mdviewer/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ steps.swift-version.outputs.version }}-

      - name: Run tests
        run: cd mdviewer && swift test -Xswiftc -warnings-as-errors

      - name: Build and package app
        run: bash scripts/build.sh --no-tests

      - name: Upload md.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-app
          path: release/md.app
          retention-days: 7
          if-no-files-found: error
