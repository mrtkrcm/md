name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: mdviewer/.build
          key: ${{ runner.os }}-swift-fmt-${{ hashFiles('mdviewer/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-fmt-

      - name: Check formatting
        shell: bash
        run: bash scripts/format.sh --check

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    needs: format

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe (version derivation)

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: mdviewer/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('mdviewer/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Run tests
        shell: bash
        run: cd mdviewer && swift test -Xswiftc -warnings-as-errors

      - name: Build and package app
        shell: bash
        env:
          CI: "1"  # tells RendererPerformanceTests to skip budget assertions
        run: bash scripts/build.sh --no-tests

      - name: Upload md.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-app
          path: release/md.app
          retention-days: 7
          if-no-files-found: error
