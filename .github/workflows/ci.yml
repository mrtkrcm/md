name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  format:
    name: Format Check
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SwiftFormat Lint
        run: bash scripts/format.sh --check

  quality:
    name: Build and Test
    runs-on: macos-latest
    needs: format

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quality Checks
        run: bash scripts/quality.sh --skip-format

      - name: Performance Smoke (Non-blocking)
        run: |
          cd mdviewer
          swift test --filter RendererPerformanceTests -v || true
